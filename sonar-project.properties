# Project Identification
sonar.projectKey=wanderlust
sonar.projectName=wanderlust
sonar.projectVersion=1.0

# Source directories
sonar.sources=frontend,backend

# Encoding
sonar.sourceEncoding=UTF-8

# Language specific
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.testExecutionReportPaths=frontend/coverage/test-reporter.xml

# Exclude unnecessary files from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js,**/coverage/**